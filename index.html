<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vyjmenovaná slova</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.2);
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --text-hint: #999;
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --teal-dark: #085041;
    --teal-deep: #04342C;
    --amber-light: #FAEEDA;
    --amber-border: #EF9F27;
    --amber-text: #633806;
    --red-light: #FCEBEB;
    --red-border: #A32D2D;
    --red-text: #501313;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-pill: 999px;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem 4rem;
    color: var(--text);
  }

  #app {
    width: 100%;
    max-width: 620px;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 34px;
    color: var(--text);
    margin-bottom: 4px;
    letter-spacing: -0.5px;
  }

  .subtitle {
    font-size: 15px;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
  }

  .mode-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .modeBtn {
    padding: 7px 18px;
    border-radius: var(--radius-pill);
    border: 1.5px solid var(--border-strong);
    background: var(--surface);
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    transition: all .15s;
    font-family: 'Nunito', sans-serif;
  }

  .modeBtn:hover { background: #f0f0f0; }

  .modeBtn.active {
    background: var(--teal);
    border-color: var(--teal-dark);
    color: #fff;
  }

  .trap-badge {
    display: inline-block;
    background: var(--amber-light);
    color: var(--amber-text);
    border: 1px solid var(--amber-border);
    border-radius: var(--radius-pill);
    font-size: 11px;
    font-weight: 700;
    padding: 2px 10px;
    margin-left: 8px;
    vertical-align: middle;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.75rem;
    margin-bottom: 1rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .score-row {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .sbox {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 10px 18px;
    text-align: center;
    min-width: 72px;
    border: 1px solid var(--border);
  }

  .sbox .num { font-size: 22px; font-weight: 700; color: var(--text); }
  .sbox .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }

  .progress-bar {
    height: 8px;
    background: var(--bg);
    border-radius: var(--radius-pill);
    overflow: hidden;
    margin-bottom: 1.5rem;
    border: 1px solid var(--border);
  }

  .progress-fill {
    height: 100%;
    background: var(--teal);
    border-radius: var(--radius-pill);
    transition: width .4s ease;
  }

  .letter-tag {
    display: inline-block;
    background: var(--teal-light);
    color: var(--teal-dark);
    border-radius: var(--radius-pill);
    font-size: 12px;
    font-weight: 700;
    padding: 3px 14px;
    margin-bottom: 14px;
  }

  .sentence {
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.8;
    margin-bottom: 1.5rem;
    letter-spacing: -0.3px;
  }

  .blank {
    display: inline-block;
    border-bottom: 3px solid var(--teal);
    min-width: 24px;
    text-align: center;
    margin: 0 1px;
    font-weight: 700;
    color: var(--teal-deep);
    font-size: 24px;
  }

  .blank-other {
    display: inline-block;
    border-bottom: 2px solid #ccc;
    min-width: 20px;
    text-align: center;
    margin: 0 1px;
    color: var(--text-hint);
    font-size: 24px;
  }

  .choices {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }

  .choice {
    padding: 11px 26px;
    border-radius: var(--radius-pill);
    border: 2px solid var(--border-strong);
    background: var(--bg);
    cursor: pointer;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    transition: all .15s;
    font-family: 'Nunito', sans-serif;
  }

  .choice:hover {
    border-color: var(--teal);
    background: var(--teal-light);
    color: var(--teal-deep);
  }

  .choice.correct {
    background: var(--teal-light);
    border-color: var(--teal);
    color: var(--teal-deep);
  }

  .choice.wrong {
    background: var(--red-light);
    border-color: var(--red-border);
    color: var(--red-text);
  }

  .feedback {
    font-size: 15px;
    font-weight: 700;
    min-height: 24px;
    margin-bottom: 1rem;
  }

  .feedback.ok { color: #0F6E56; }
  .feedback.err { color: var(--red-border); }

  .hint-box {
    background: var(--amber-light);
    border: 1px solid var(--amber-border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--amber-text);
    margin-bottom: 1rem;
    line-height: 1.5;
  }

  .next-btn {
    padding: 11px 30px;
    border-radius: var(--radius-pill);
    border: none;
    background: var(--teal);
    color: white;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: background .15s;
  }

  .next-btn:hover { background: #0F6E56; }
  .next-btn:disabled { opacity: .4; cursor: default; }

  .end-screen { text-align: center; padding: 2rem 1rem; }
  .trophy { font-size: 56px; margin-bottom: .75rem; }

  .end-title {
    font-family: 'Fredoka One', cursive;
    font-size: 28px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .end-sub {
    font-size: 15px;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1.75rem;
  }

  .restart-btn {
    padding: 12px 28px;
    border-radius: var(--radius-pill);
    border: none;
    background: var(--teal);
    color: white;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    margin: 4px;
    transition: background .15s;
  }

  .restart-btn:hover { background: #0F6E56; }

  .ghost-btn {
    background: var(--bg);
    color: var(--text);
    border: 1.5px solid var(--border-strong);
  }

  .ghost-btn:hover { background: #ececec; }
</style>
</head>
<body>
<div id="app">
  <h1>Vyjmenovaná slova</h1>
  <p class="subtitle">Doplň správné písmeno na místo podtržítka</p>

  <div id="main"></div>
</div>

  {s:"Z_skal první cenu.",a:"í",letter:"DVOJICE",trap:true,hint:"'Získal' — od slova získat. Píšeme í."},

let mode="all", questions=[], qIdx=0, score=0, trapScore=0, trapTotal=0, answered=false;

function setMode(m) {
  mode = m;
  document.querySelectorAll('.modeBtn').forEach(b => b.classList.remove('active'));
  document.getElementById('mode' + m.charAt(0).toUpperCase() + m.slice(1)).classList.add('active');
  startGame();
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  let pool = [...ALL_Q];
  if (mode === 'pure') pool = pool.filter(q => !q.trap);
  if (mode === 'trap') pool = pool.filter(q => q.trap);
  questions = shuffle(pool).slice(0, 15);
  qIdx = 0; score = 0; trapScore = 0; trapTotal = 0; answered = false;
  renderQ();
}

function getOpts(a) {
  return shuffle(['y/ý', 'i/í']);
}

function correctGroup(a) {
  return ['y','ý'].includes(a) ? 'y/ý' : 'i/í';
}

function buildSentenceHTML(s, a2) {
  let first = true;
  return s.replace(/_/g, () => {
    if (first) {
      first = false;
      return `<span class="blank" id="bl0">_</span>`;
    } else {
      return `<span class="blank-other">${a2 || '_'}</span>`;
    }
  });
}

function renderQ() {
  const main = document.getElementById('main');
  if (qIdx >= questions.length) { renderEnd(); return; }
  const q = questions[qIdx];
  answered = false;
  if (q.trap) trapTotal++;
  const pct = Math.round((qIdx / questions.length) * 100);
  const opts = getOpts(q.a);
  const sentHTML = buildSentenceHTML(q.s, q.a2);

  main.innerHTML = `
    <div class="score-row">
      <div class="sbox"><div class="num">${score}</div><div class="lbl">správně</div></div>
      <div class="sbox"><div class="num">${qIdx}</div><div class="lbl">hotovo</div></div>
      <div class="sbox"><div class="num">${questions.length - qIdx}</div><div class="lbl">zbývá</div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="card">
      <div style="margin-bottom:12px">
        <span class="letter-tag">${q.letter === 'DVOJICE' ? 'Záludná dvojice' : 'Po ' + q.letter}</span>${q.trap ? '<span class="trap-badge">chyták</span>' : ''}
      </div>
      <div class="sentence">${sentHTML}</div>
      <div class="choices" id="choices">
        ${opts.map(o => `<button class="choice" data-val="${o}">${o}</button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <div id="hintBox"></div>
      <button class="next-btn" id="nxt" disabled>Další →</button>
    </div>
  `;

  document.querySelectorAll('.choice').forEach(btn => {
    btn.addEventListener('click', () => choose(btn.dataset.val, correctGroup(q.a), q.trap, q.hint || ''));
  });
  document.getElementById('nxt').addEventListener('click', nextQ);
}

function choose(sel, correctGrp, isTrap, hint) {
  if (answered) return;
  answered = true;
  const btns = document.querySelectorAll('.choice');
  const fb = document.getElementById('feedback');
  const bl = document.getElementById('bl0');
  const hb = document.getElementById('hintBox');
  const q = questions[qIdx];
  if (sel === correctGrp) {
    score++;
    if (isTrap) trapScore++;
    fb.textContent = 'Správně!';
    fb.className = 'feedback ok';
    if (bl) bl.textContent = q.a;
    btns.forEach(b => { if (b.dataset.val === correctGrp) b.className = 'choice correct'; });
  } else {
    fb.textContent = `Správná odpověď je: ${q.a}`;
    fb.className = 'feedback err';
    if (bl) bl.textContent = q.a;
    btns.forEach(b => {
      if (b.dataset.val === sel) b.className = 'choice wrong';
      if (b.dataset.val === correctGrp) b.className = 'choice correct';
    });
    if (hint) { hb.innerHTML = `<div class="hint-box">Vysvětlení: ${hint}</div>`; }
  }
  document.getElementById('nxt').disabled = false;
}

function nextQ() { qIdx++; renderQ(); }

function renderEnd() {
  const pct = Math.round((score / questions.length) * 100);
  const icon = pct === 100 ? '🏆' : pct >= 75 ? '⭐' : pct >= 50 ? '👍' : '💪';
  const msg = pct === 100 ? 'Perfektní! Všechno správně!' : pct >= 75 ? 'Výborně!' : pct >= 50 ? 'Dobrá práce, ale ještě trénuj!' : 'Nevadí, zkus to znovu!';
  document.getElementById('main').innerHTML = `
    <div class="card end-screen">
      <div class="trophy">${icon}</div>
      <div class="end-title">${msg}</div>
      <div class="end-sub">Celkové výsledky</div>
      <div class="stat-grid">
        <div class="sbox"><div class="num">${score}/${questions.length}</div><div class="lbl">správně</div></div>
        <div class="sbox"><div class="num">${pct}%</div><div class="lbl">úspěšnost</div></div>
        <div class="sbox"><div class="num">${trapTotal > 0 ? trapScore + '/' + trapTotal : '—'}</div><div class="lbl">chytáky</div></div>
      </div>
      <div>
        <button class="restart-btn" id="btnRestart">Hrát znovu</button>
      </div>
    </div>
  `;
  document.getElementById('btnRestart').addEventListener('click', startGame);
}

document.getElementById('modeAll') && document.getElementById('modeAll').addEventListener('click', () => setMode('all'));

startGame();
</script>
</body>
</html>
